name: Nightly Pattern Build

on:
  schedule:
    - cron: '30 14 * * *' # Midnight SGT (UTC+8)
  workflow_dispatch:

jobs:
  build-pattern:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          claude_args: '--allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch,NotebookEdit"'
          prompt: |
            Execute the build-pattern skill with the --auto flag.

            This runs the full 8-step pattern development pipeline automatically:
            1. Auto-selects the next unchecked pattern from CONTENT_CALENDAR.md
            2. Researches the pattern (reads PLAYBOOK.md, PATTERN_TEMPLATE.md, brand-assets/voice-calibration-guide.md)
            3. Designs the architecture, core abstraction, and failure modes — writes to the pattern's README.md
            4. Implements the pattern in TypeScript (src/ts/) with a mock provider, then ports to Python (src/py/)
            5. Writes unit, failure-mode, and integration tests
            6. Designs and runs benchmarks (writes benchmarks/scenarios.md and benchmarks/results.md)
            7. Calculates cost projections at 1K/10K/100K requests per day (writes cost-analysis.md)
            8. Generates ops/observability docs, applies visual formatting, and adds source citations to the README
            9. Runs the completeness audit checklist and updates the progress checkbox in CONTENT_CALENDAR.md

            In --auto mode all user checkpoints are skipped, default choices are applied for
            benchmark scenarios, tabulation, citations, and verification. Social posts are skipped.
            If OPENAI_API_KEY is unavailable, cross-verification is skipped automatically.

            Commit all changes locally when done. Do NOT create a branch or open a PR — that is handled by a later step.

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: pattern-build/${{ github.run_id }}
          title: 'chore: nightly pattern build'
          body: |
            Automated nightly pattern build.

            Generated by [Nightly Pattern Build #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          commit-message: 'chore: nightly pattern build'
          delete-branch: true
